spring:
  app:
    name: "Diploma"

  datasource:
    url: jdbc:postgresql://localhost:5435/postgres
    driverClassName: org.postgresql.Driver
    username: postgres
    password: postgres

  liquibase:
    enabled: true
    change-log: "classpath:db/changelog/db.changelog-master.yaml"
    drop-first: false

  kafka:
    bootstrap-servers: localhost:9092

server:
  port: 8081

  redis:
    host: localhost
    port: 6379
    password: password
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

    cache:
      type: redis
      redis:
        time-to-live: 600000
        cache-null-values: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: diploma-app
