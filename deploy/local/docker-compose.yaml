  diploma-zookeeper-patroni-1:
    image: confluentinc/cp-zookeeper:7.4.4
    container_name: diploma-zookeeper-patroni-1
    hostname: diploma-zookeeper-patroni-1
    environment:
      ZOOKEEPER_SERVER_ID: 1
      ZOOKEEPER_CLIENT_PORT: 2182
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_SERVERS: diploma-zookeeper-patroni-1:2888:3888;diploma-zookeeper-patroni-2:2888:3888
    ports:
      - "2182:2181"
    volumes:
      - ./zookeeeper-script/zk-patroni-watcher.py:/zk-patroni-watcher.py
      - ./zookeeeper-script/entrypoint-zookeeper.sh:/entrypoint-zookeeper.sh
    command: >
      sh -c "
      cp /entrypoint-zookeeper.sh /tmp/entrypoint-zookeeper.sh &&
      chmod +x /tmp/entrypoint-zookeeper.sh &&
      /tmp/entrypoint-zookeeper.sh
      "
    networks:
      - diploma-network

  diploma-zookeeper-patroni-2:
    image: confluentinc/cp-zookeeper:7.4.4
    container_name: diploma-zookeeper-patroni-2
    hostname: diploma-zookeeper-patroni-2
    environment:
      ZOOKEEPER_SERVER_ID: 2
      ZOOKEEPER_CLIENT_PORT: 2183
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_SERVERS: diploma-zookeeper-patroni-1:2888:3888;diploma-zookeeper-patroni-2:2888:3888
    ports:
      - "2183:2181"
    networks:
      - diploma-network

  patroni1:
    build:
      context: ./patroni-master
      dockerfile: Dockerfile
    container_name: patroni1
    depends_on:
      - diploma-zookeeper-patroni-1
      - diploma-zookeeper-patroni-2
    environment:
      PATRONI_NAME: patroni1
      PATRONI_SCOPE: postgres-cluster
      PATRONI_NAMESPACE: /service/
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: patroni1:8008
      PATRONI_ZOOKEEPER_HOSTS: "['diploma-zookeeper-patroni-1:2182', 'diploma-zookeeper-patroni-2:2183']"
      PATRONI_POSTGRESQL_LISTEN: 0.0.0.0:5432
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: patroni1:5432
      PATRONI_SUPERUSER_USERNAME: postgres
      PATRONI_SUPERUSER_PASSWORD: postgres
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: replicator
      PATRONI_WAL_LEVEL: logical
    ports:
      - "5433:5432"
      - "8008:8008"
    networks:
      - diploma-network

  patroni2:
    build:
      context: ./patroni-master
      dockerfile: Dockerfile
    container_name: patroni2
    depends_on:
      - diploma-zookeeper-patroni-1
      - diploma-zookeeper-patroni-2
    environment:
      PATRONI_NAME: patroni2
      PATRONI_SCOPE: postgres-cluster
      PATRONI_NAMESPACE: /service/
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: patroni2:8008
      PATRONI_ZOOKEEPER_HOSTS: "['diploma-zookeeper-patroni-1:2182', 'diploma-zookeeper-patroni-2:2183']"
      PATRONI_POSTGRESQL_LISTEN: 0.0.0.0:5432
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: patroni2:5432
      PATRONI_SUPERUSER_USERNAME: postgres
      PATRONI_SUPERUSER_PASSWORD: postgres
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: replicator
      PATRONI_WAL_LEVEL: logical
    ports:
      - "5434:5432"
      - "8009:8008"
    networks:
      - diploma-network

  diploma-experiment-postgres:
    image: postgres:latest
    container_name: diploma-experiment-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5436:5432"


networks:
  diploma-network:
    driver: bridge