version: '3.9'

services:
  diploma-cache-metadata-postgres:
    image: postgres:latest
    container_name: diploma-cache-metadata-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5435:5432"

  diploma-zookeeper:
    image: confluentinc/cp-zookeeper:7.4.4
    container_name: diploma-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - 2181:2181
    networks:
      - diploma-network

  diploma-kafka:
    image: confluentinc/cp-kafka:7.4.4
    container_name: diploma-kafka
    depends_on:
      - diploma-zookeeper
    ports:
      - 9092:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: diploma-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://diploma-kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    networks:
      - diploma-network

  diploma-kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: diploma-kafka-ui
    depends_on:
      - diploma-kafka
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: diploma-kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: diploma-zookeeper:2181
    networks:
      - diploma-network

  diploma-debezium:
    image: debezium/connect:1.4
    container_name: diploma-debezium
    environment:
      BOOTSTRAP_SERVERS: diploma-kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
    depends_on:
      - diploma-kafka
    ports:
      - 8083:8083
    networks:
      - diploma-network

  diploma-redis:
    image: redis:latest
    container_name: diploma-redis
    environment:
      - REDIS_PASSWORD=password
      - REDIS_USER=redis
      - REDIS_USER_PASSWORD=password
    ports:
      - "6379:6379"
    networks:
      - diploma-network

